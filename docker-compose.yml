version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: taskmanager_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: taskmanager
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: taskmanager_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@db:3306/taskmanager
      - JWT_SECRET=supersecretkey
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: taskmanager_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
